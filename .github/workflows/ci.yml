name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black ruff mypy pytest
        pip install -r requirements.txt
    
    - name: Run Black
      run: black --check src/ scripts/ tests/ demo/
    
    - name: Run Ruff
      run: ruff check src/ scripts/ tests/ demo/
    
    - name: Run MyPy
      run: mypy src/ scripts/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=src --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml

  build-and-export:
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Train and export models
      run: |
        python scripts/train.py --config configs/config.yaml --model-type base --framework pytorch --output-dir models/
        python scripts/export.py --model-path models/pytorch_base_model.pth --formats onnx --output-dir models/exported/
    
    - name: Run evaluation
      run: |
        python scripts/evaluate.py --config configs/config.yaml --output-dir reports/ --include-plots
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: models-and-reports
        path: |
          models/
          reports/
        retention-days: 7

  demo-test:
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test Streamlit app
      run: |
        python -c "import streamlit; print('Streamlit import successful')"
        python -c "import demo.app; print('Demo app import successful')"
    
    - name: Test demo components
      run: |
        python -c "
        import sys
        sys.path.append('src')
        from utils.data_utils import NetworkTrafficGenerator
        from omegaconf import OmegaConf
        config = OmegaConf.load('configs/config.yaml')
        generator = NetworkTrafficGenerator(config)
        X, y = generator.generate_dataset()
        print(f'Generated {len(X)} samples with intrusion rate {y.mean():.3f}')
        "
